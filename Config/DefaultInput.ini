[/Script/Engine.InputSettings]
; Legacy axis/action mappings so the project is playable with zero asset authoring.
; (Migrate to Enhanced Input + InputAction assets when you build out real controls.)

+AxisMappings=(AxisName="MoveForward",Scale=1.000000,Key=W)
+AxisMappings=(AxisName="MoveForward",Scale=-1.000000,Key=S)
+AxisMappings=(AxisName="MoveRight",Scale=1.000000,Key=D)
+AxisMappings=(AxisName="MoveRight",Scale=-1.000000,Key=A)
+AxisMappings=(AxisName="Turn",Scale=1.000000,Key=MouseX)
+AxisMappings=(AxisName="LookUp",Scale=-1.000000,Key=MouseY)
+AxisMappings=(AxisName="MoveForward",Scale=1.000000,Key=Gamepad_LeftY)
+AxisMappings=(AxisName="MoveRight",Scale=1.000000,Key=Gamepad_LeftX)
+AxisMappings=(AxisName="Turn",Scale=1.000000,Key=Gamepad_RightX)
+AxisMappings=(AxisName="LookUp",Scale=1.000000,Key=Gamepad_RightY)

; First-person movement.
+ActionMappings=(ActionName="Jump",Key=SpaceBar)
+ActionMappings=(ActionName="Sprint",Key=LeftShift)
+ActionMappings=(ActionName="Sprint",Key=Gamepad_LeftShoulder)
+ActionMappings=(ActionName="Crouch",Key=LeftControl)
+ActionMappings=(ActionName="Crouch",Key=C)
+ActionMappings=(ActionName="Crouch",Key=Gamepad_FaceButton_Right)

+ActionMappings=(ActionName="Fire",Key=LeftMouseButton)
+ActionMappings=(ActionName="Fire",Key=Gamepad_RightTrigger)

; Grab/throw a physics object (RMB): grab a nearby item, or throw the held one.
+ActionMappings=(ActionName="Grab",Key=RightMouseButton)
+ActionMappings=(ActionName="Grab",Key=Gamepad_LeftTrigger)

+ActionMappings=(ActionName="Interact",Key=E)
+ActionMappings=(ActionName="Interact",Key=Gamepad_FaceButton_Bottom)
+ActionMappings=(ActionName="SpectateNext",Key=Right)
+ActionMappings=(ActionName="SpectateNext",Key=Gamepad_DPad_Right)
+ActionMappings=(ActionName="SpectatePrev",Key=Left)
+ActionMappings=(ActionName="SpectatePrev",Key=Gamepad_DPad_Left)

; Minigame controls (forwarded to the active match; ignored in the hub).
; Peach Basket uses only MGPrimary (Space). Peach Artillery uses the rest.
+ActionMappings=(ActionName="MGPrimary",Key=SpaceBar)
+ActionMappings=(ActionName="MGPrimary",Key=Gamepad_FaceButton_Bottom)
+ActionMappings=(ActionName="MGLeft",Key=A)
+ActionMappings=(ActionName="MGRight",Key=D)
+ActionMappings=(ActionName="MGUp",Key=W)
+ActionMappings=(ActionName="MGDown",Key=S)
+ActionMappings=(ActionName="MGPowerUp",Key=R)
+ActionMappings=(ActionName="MGPowerDown",Key=F)
+ActionMappings=(ActionName="MGWeapon",Key=Q)
